[project]
name = "guidance-agents"
version = "0.1.0"
description = ""
authors = [
    {name = "Aidan",email = "aidanjh2012@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.12,<4.0"
dependencies = [
    "pocketflow (>=0.0.3,<0.0.4)",
    "openai (>=2.30.0,<3.0.0)",
    "python-dotenv (>=1.2.2,<2.0.0)",
    "pyyaml (>=6.0.3,<7.0.0)",
    "llm-canvas>=0.2.2",
    "attrs>=26.0.0",
    "jinja2>=3.1.0",
    "langfuse>=3.12.0",
    "pydantic>=2.0.0,<3.0.0",
    "beanie>=1.23.0,<2.0.0",
    "motor>=3.0.0,<4.0.0"
]

[tool.poetry]
package-mode = false
packages = [{include = "guidance_deep_research", from = "src"}]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
